workflows:
  build-go-ios-static:
    name: Build Go iOS Static Library
    instance_type: mac_mini_m2
    max_build_duration: 40
    environment:
      vars:
        GO111MODULE: "on"
    scripts:
      - name: Go mod tidy
        script: |
          go mod tidy

      - name: Build iOS arm64 static library
        script: |
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC=clang \
          CXX=clang++ \
          go build -buildmode=c-archive -o libshowstart.a .

      - name: List files (for debug)
        script: |
          ls -la

    artifacts:
      - libshowstart.a
      - "*.h"  # 匹配所有 .h 文件，自动捕获 Go 生成的头文件