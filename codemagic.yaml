workflows:
  build-go-ios-static:
    name: Build Go iOS Static Library
    instance_type: mac_mini_m2
    max_build_duration: 40
    environment:
      vars:
        GO111MODULE: "on"
    scripts:
      - name: Go mod tidy
        script: |
          go mod tidy

      - name: Build iOS arm64 default output
        script: |
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC=clang \
          CXX=clang++ \
          go build -buildmode=c-archive

      - name: Show files
        script: |
          ls -la

    artifacts:
      - main.a
      - main.h