workflows:
  build-go-ios-static:
    name: Build Go iOS Static Library
    instance_type: mac_mini_m2
    max_build_duration: 40
    environment:
      vars:
        GO111MODULE: "on"
    scripts:
      - name: Go mod tidy
        script: |
          go mod tidy

      # 重点：输出名字必须带 _arm64，Go 才会自动生成同名 .h
      - name: Build iOS arm64 static library
        script: |
          CGO_ENABLED=1 \
          GOOS=darwin \
          GOARCH=arm64 \
          CC=clang \
          CXX=clang++ \
          go build -buildmode=c-archive -o libshowstart_arm64.a .

      # 看一下到底生成了啥
      - name: List files
        script: |
          ls -la

    artifacts:
      - libshowstart_arm64.a
      - libshowstart_arm64.h